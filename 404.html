  <style>
    /* ===========================================================
       KELSO DESIGN SYSTEM — Tokens + components, inlined.
       The split-file source of truth lives in
       /design_handoff_kelso_site/design_system/.
       =========================================================== */

    :root {
      /* Color */
      --paper:        #F2EFE7;
      --paper-deep:   #E8E4D7;
      --surface:      #FFFFFF;
      --rule:         #D9D4C7;
      --ink:          #15171A;
      --ink-soft:     #4A4E55;
      --ink-faint:    #8A8E96;
      --signal:       #C1421C;
      --signal-deep:  #8E2F12;
      --signal-wash:  rgba(193, 66, 28, 0.08);
      --blueprint:    #2B3A55;
      --blueprint-wash: rgba(43, 58, 85, 0.06);

      /* Type */
      --font-display: "Instrument Serif", "Iowan Old Style", Georgia, serif;
      --font-sans:    "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
      --w-regular:    400;
      --w-medium:     500;
      --w-semibold:   600;

      --t-meta:       0.75rem;
      --t-small:      0.875rem;
      --t-body:       1rem;
      --t-lead:       1.1875rem;
      --t-h3:         1.4375rem;
      --t-h2:         1.875rem;
      --t-h1:         2.625rem;
      --t-display:    4.5rem;

      --tr-tight:     -0.02em;
      --tr-snug:      -0.01em;
      --tr-normal:    0;
      --tr-wide:      0.08em;
      --tr-widest:    0.14em;

      --lh-tight:     1.1;
      --lh-snug:      1.25;
      --lh-body:      1.55;
      --lh-loose:     1.7;

      /* Layout */
      --sp-hair: 4px; --sp-1: 8px; --sp-2: 12px; --sp-3: 16px; --sp-4: 24px;
      --sp-5:   32px; --sp-6: 48px; --sp-7: 64px; --sp-8: 96px; --sp-9: 128px;
      --radius-sm: 2px; --radius-md: 4px; --radius-lg: 8px;
      --measure: 66ch; --measure-narrow: 52ch; --measure-wide: 78ch;
      --container: 1120px; --container-narrow: 720px;
      --hairline: rgba(21, 23, 26, 0.12);
      --hairline-strong: rgba(21, 23, 26, 0.28);
      --shadow-card: 0 1px 0 var(--hairline), 0 12px 32px -16px rgba(21,23,26,0.15);
    }

    /* Base */
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      font-size: 17px;
      font-weight: var(--w-regular);
      line-height: var(--lh-body);
      color: var(--ink-soft);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    h1, h2, h3, h4, h5, h6 {
      margin: 0 0 var(--sp-3);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: var(--w-medium);
      letter-spacing: var(--tr-snug);
      line-height: var(--lh-snug);
      text-wrap: balance;
    }
    h1 { font-size: var(--t-h1); letter-spacing: var(--tr-tight); }
    h2 { font-size: var(--t-h2); }
    h3 { font-size: var(--t-h3); }
    p  { margin: 0 0 var(--sp-3); max-width: var(--measure); text-wrap: pretty; }

    a {
      color: var(--ink);
      text-decoration: none;
      background-image: linear-gradient(currentColor, currentColor);
      background-size: 100% 1px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: color 0.15s, background-size 0.15s;
    }
    a:hover { color: var(--signal-deep); }
    strong { color: var(--ink); font-weight: var(--w-medium); }
    em { font-style: italic; }
    small { font-size: var(--t-small); color: var(--ink-faint); }
    ::selection { background: var(--signal); color: var(--surface); }

    .eyebrow {
      display: inline-block;
      font-family: var(--font-mono);
      font-weight: var(--w-medium);
      font-size: var(--t-meta);
      letter-spacing: var(--tr-wide);
      text-transform: uppercase;
      color: var(--ink-faint);
    }
    .eyebrow .num { color: var(--signal); margin-right: 0.6em; }

    /* Container */
    .container { max-width: 66rem; margin: 0 auto; padding: 0 var(--sp-5); }

    /* Buttons */
    .btn {
      -webkit-appearance: none; appearance: none;
      display: inline-flex; align-items: center; gap: 0.6em;
      font-family: var(--font-sans);
      font-weight: var(--w-medium);
      font-size: var(--t-body);
      line-height: 1;
      text-decoration: none;
      background: none; background-image: none;
      cursor: pointer;
      padding: 0.75em 1.1em;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      color: var(--ink);
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.05s;
    }
    .btn:active { transform: translateY(1px); }
    .btn .chev { font-family: var(--font-mono); font-weight: 400; opacity: 0.75; }
    .btn--ghost   { border-color: var(--hairline-strong); background: transparent; }
    .btn--ghost:hover { background: var(--paper-deep); border-color: var(--ink); color: var(--ink); }
    .btn--primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .btn--primary:hover { background: var(--signal); border-color: var(--signal); color: var(--surface); }
    .btn--signal  { background: var(--signal); color: var(--surface); border-color: var(--signal); }
    .btn--signal:hover { background: var(--signal-deep); border-color: var(--signal-deep); color: var(--surface); }

    /* Nav */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-4) 0;
    }
    .nav .mark {
      font-family: var(--font-mono);
      font-size: var(--t-meta);
      letter-spacing: var(--tr-widest);
      text-transform: uppercase;
      color: var(--ink);
      font-weight: var(--w-medium);
      background: none;
    }
    .nav .mark .signal { color: var(--signal); }
    .nav ul { display: flex; gap: var(--sp-5); list-style: none; margin: 0; padding: 0; }
    .nav ul a {
      font-family: var(--font-mono);
      font-size: var(--t-meta);
      letter-spacing: var(--tr-wide);
      text-transform: uppercase;
      color: var(--ink-soft);
      background: none;
    }
    .nav ul a:hover { color: var(--ink); }

    /* Nav quiet (no wordmark) */
    .nav--quiet { justify-content: flex-start; }
    .nav--quiet ul { gap: var(--sp-4); }

    /* Footer */
    .footer {
      padding: var(--sp-5) 0 var(--sp-4);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: var(--sp-4);
      font-family: var(--font-mono);
      font-size: var(--t-meta);
      letter-spacing: var(--tr-wide);
      text-transform: uppercase;
      color: var(--ink-faint);
    }
    .footer a { background: none; color: var(--ink-soft); }
    .footer a:hover { color: var(--ink); }
    .footer ul { list-style: none; display: flex; gap: var(--sp-4); margin: 0; padding: 0; }

    /* ===========================================================
       404 PAGE LAYOUT
       =========================================================== */

    main { display: block; }

    .error-wrap {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      padding: var(--sp-8) 0;
    }

    .error-block {
      max-width: 56ch;
    }

    .error-code {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 18vw, 11rem);
      font-weight: var(--w-medium);
      color: var(--signal);
      letter-spacing: var(--tr-tight);
      line-height: 1;
      margin: 0 0 var(--sp-4);
      display: block;
    }

    .error-block h1 {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: var(--lh-snug);
      letter-spacing: var(--tr-tight);
      color: var(--ink);
      margin: 0 0 var(--sp-4);
    }

    .error-block p {
      font-size: var(--t-lead);
      line-height: var(--lh-loose);
      color: var(--ink-soft);
      max-width: 48ch;
      margin: 0 0 var(--sp-5);
    }

    .error-actions {
      display: flex;
      gap: var(--sp-2);
      flex-wrap: wrap;
    }

    /* Responsive */
    @media (max-width: 560px) {
      .container { padding: 0 var(--sp-3); }
      .nav ul { gap: var(--sp-3); }
      .error-wrap { padding: var(--sp-6) 0; }
    }
  </style>
</head>
